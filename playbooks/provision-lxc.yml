---
- name: Provision Proxmox LXC containers
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Ensure LXC containers exist
      community.proxmox.proxmox:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"

        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ hostvars[item].ctid }}"
        hostname: "{{ item }}"
        ostemplate: "{{ lxc_template }}"
        password: "{{ lxc_root_password }}"
        pubkey: "{{ controller_ssh_pubkey }}"
        unprivileged: true

        cores: "{{ hostvars[item].cores }}"
        memory: "{{ hostvars[item].memory }}"

        swap: "{{ lxc_swap }}"
        disk_volume:
          storage: "{{ lxc_storage }}"
          size: "{{ hostvars[item].disk }}"

        netif:
          net0: "name=eth0,bridge=vmbr0,ip={{ hostvars[item].ansible_host }}{{ network_prefix }},gw={{ network_gateway }}"

        features:
          - nesting=1
        onboot: true
        state: present

      loop: "{{ groups['lxc_containers'] }}"
      loop_control:
        label: "{{ hostvars[item].ctid }} {{ item }}"

    - name: Ensure LXC containers are started
      community.general.proxmox:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ hostvars[item].ctid }}"
        state: started
      loop: "{{ groups['lxc_containers'] }}"
      loop_control:
        label: "{{ hostvars[item].ctid }} {{ item }}"
