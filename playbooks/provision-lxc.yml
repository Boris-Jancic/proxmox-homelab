---
- name: Provision Proxmox LXC containers
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Ensure LXC containers exist
      community.proxmox.proxmox:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"

        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ item.ctid }}"
        hostname: "{{ item.hostname }}"
        ostemplate: "{{ lxc_template }}"
        cores: "{{ item.cores }}"
        memory: "{{ item.memory }}"
        swap: "{{ lxc_swap }}"
        storage: "{{ lxc_storage }}"
        disk: "{{ item.disk }}"
        netif:
          net0: "name=eth0,bridge=vmbr0,ip={{ item.ip }},gw={{ network_gateway }}"
        password: "{{ lxc_root_password }}"
        unprivileged: true
        features:
          - nesting=1
        onboot: true
        state: present
      loop: "{{ lxc_containers }}"
      loop_control:
        label: "{{ item.ctid }} {{ item.hostname }}"

    - name: Ensure LXC containers are started
      community.general.proxmox:
        api_host: "{{ proxmox_api_host }}"
        api_user: "{{ proxmox_api_user }}"
        api_password: "{{ proxmox_api_password }}"
        validate_certs: false
        node: "{{ proxmox_node }}"
        vmid: "{{ item.ctid }}"
        state: started
      loop: "{{ lxc_containers }}"
      loop_control:
        label: "{{ item.ctid }} {{ item.hostname }}"
