---
- name: Create Virtual Machine
  proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    node: "{{ proxmox_node }}"
    name: "ubuntu24-{{ item }}"
    vmid: 110
    # newid: "{{ item }}"
    # clone: test
    storage: "{{storage}}"
    state: present
  timeout: 300 # 5m

- name: Update
  proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    node: "{{ proxmox_node }}"
    vmid: 110
    ipconfig:
      ipconfig0: 'ip=192.168.88.110/24,gw=192.168.88.1'
    update: yes

- name: Start VM
  proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    node: "{{ proxmox_node }}"
    vmid: 110
    state: started

