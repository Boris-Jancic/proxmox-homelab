---
- name: Install runtime deps for the pi-hole installer
  apt:
    name:
      - curl
      - ca-certificates
    state: present
    update_cache: true

- name: Ensure /etc/pihole exists
  file:
    path: /etc/pihole
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Stage setupVars.conf as preseed for unattended install
  template:
    src: setupVars.conf.j2
    dest: /etc/pihole/setupVars.conf
    owner: root
    group: root
    mode: "0644"

- name: Run pi-hole unattended installer
  shell: |
    set -o pipefail
    curl -sSL https://install.pi-hole.net | PIHOLE_SKIP_OS_CHECK=true bash /dev/stdin --unattended
  args:
    executable: /bin/bash
    creates: /usr/local/bin/pihole
