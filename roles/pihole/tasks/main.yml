---
- name: Verify pi-hole is installed
  stat:
    path: /usr/local/bin/pihole
  register: pihole_bin

- name: Fail if pi-hole binary missing
  fail:
    msg: "pi-hole not installed. This role manages config for an existing install — install pi-hole manually first."
  when: not pihole_bin.stat.exists

- name: Verify pi-hole v5.x layout (setupVars.conf present)
  stat:
    path: /etc/pihole/setupVars.conf
  register: setupvars_file

- name: Fail if setupVars.conf absent (likely pi-hole v6+)
  fail:
    msg: "setupVars.conf not found — likely pi-hole v6+, which uses pihole.toml. This role targets v5.x."
  when: not setupvars_file.stat.exists

- name: Render /etc/pihole/setupVars.conf
  template:
    src: setupVars.conf.j2
    dest: /etc/pihole/setupVars.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart pihole dns
