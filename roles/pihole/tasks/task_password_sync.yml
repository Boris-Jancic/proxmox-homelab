---
# Idempotency for `pihole setpassword`: pi-hole stores the password as a
# salted hash, so we can't compare against stored state directly. We track
# the last-applied password's sha256 in a marker file and re-run setpassword
# only when the desired value differs.
- name: Check for ansible-managed password marker
  stat:
    path: /etc/pihole/.ansible_password_hash
  register: pw_marker_stat

- name: Read existing password marker
  slurp:
    src: /etc/pihole/.ansible_password_hash
  register: pw_marker
  when: pw_marker_stat.stat.exists

- name: Compute desired password marker
  set_fact:
    desired_pw_hash: "{{ pihole_web_password | hash('sha256') }}"

- name: Set pi-hole web password
  command: pihole setpassword "{{ pihole_web_password }}"
  no_log: true
  register: pw_set
  when: >
    not pw_marker_stat.stat.exists
    or (pw_marker.content | b64decode | trim) != desired_pw_hash

- name: Record password marker
  copy:
    content: "{{ desired_pw_hash }}\n"
    dest: /etc/pihole/.ansible_password_hash
    owner: root
    group: root
    mode: "0600"
  when: pw_set is changed

