proxmox_api_host: "127.0.0.1"
proxmox_api_port: 8006

# proxmox_api_user: "root@pam!ansible-token"
# proxmox_api_token_id: "{{ secret_proxmox_api_token_id }}"
# proxmox_api_token_secret: "{{ secret_proxmox_api_token_secret }}"

proxmox_api_user: "{{ secret_proxmox_api_user }}"
proxmox_api_password: "{{ secret_proxmox_api_user_password }}"
lxc_root_password: "{{ secret_lxc_root_password }}"

proxmox_template_vmid: 799
proxmox_storage: "local-lvm"

proxmox_node: pve

network_gateway: 192.168.88.1
network_prefix: "/24"

lxc_template: "local:vztmpl/debian-12-standard_12.12-1_amd64.tar.zst"
lxc_storage: local-lvm
lxc_swap: 256

# Read controller's SSH public key from disk so it gets baked into new LXCs
# at create time. Override the path here if you use rsa or a different file.
controller_ssh_pubkey_path: "~/.ssh/id_ed25519.pub"
controller_ssh_pubkey: "{{ lookup('file', controller_ssh_pubkey_path) }}"
